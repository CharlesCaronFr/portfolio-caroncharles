<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 : chaîne introuvable · Charles Caron</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --papier:#F1EDE2;--encre:#141414;--klein:#2318E0;
  --jaune:#FFD400;--rouge:#FF3B00;--blanc:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--encre);color:var(--papier);
  font-family:'Space Mono',monospace;
  min-height:100vh;display:grid;place-items:center;padding:24px;
}
.ecran{
  position:relative;max-width:520px;width:100%;
  background:var(--papier);color:var(--encre);
  border:4px solid #000;box-shadow:0 0 0 12px #1d1d1d,0 0 0 16px #000;
  padding:40px 28px 34px;text-align:center;overflow:hidden;
}
/* scanlines */
.ecran::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 2px,transparent 2px 4px);
  mix-blend-mode:multiply;
}
/* barre de balayage */
.ecran::after{
  content:'';position:absolute;left:0;right:0;height:70px;pointer-events:none;z-index:4;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.25),transparent);
  animation:balaye 4.5s linear infinite;
}
@keyframes balaye{from{top:-80px;}to{top:100%;}}
.canal{
  display:inline-block;background:var(--encre);color:var(--jaune);
  font-weight:700;font-size:.8rem;text-transform:uppercase;
  padding:6px 14px;animation:clignote 1.6s steps(2) infinite;
}
@keyframes clignote{50%{opacity:.35;}}
h1{
  font-family:'Archivo Black',sans-serif;
  font-size:clamp(3.5rem,16vw,6rem);line-height:1;margin:18px 0 6px;
}
p{font-size:.95rem;line-height:1.6;margin-bottom:6px;}
.otis{width:min(46vw,190px);margin:14px auto 6px;display:block;
  filter:drop-shadow(5px 5px 0 rgba(20,20,20,.15));}
.btn{
  display:inline-block;margin-top:22px;background:var(--klein);color:var(--blanc);
  border:3px solid var(--encre);box-shadow:5px 5px 0 var(--encre);
  font-family:'Space Mono';font-weight:700;text-transform:uppercase;font-size:.9rem;
  text-decoration:none;padding:14px 24px;position:relative;z-index:5;
  transition:transform .12s,box-shadow .12s;
}
.btn:hover{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--encre);}
</style>
</head>
<body>
  <main class="ecran">
    <span class="canal">CH 404</span>
    <h1>404</h1>
    <p><strong>Chaîne introuvable.</strong></p>
    <img class="otis" src="/images/otis/choque.svg" alt="Otis, la mascotte, choqué">
    <p>Otis a zappé partout, cette page n'émet plus.</p>
    <a class="btn" href="/">↩ Retour à l'antenne</a>
  </main>
</body>
</html>
