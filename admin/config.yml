# Configuration Sveltia CMS, portfolio caroncharles.fr
# Dépôt configuré. Il reste à créer l'app OAuth GitHub dans Netlify (Site settings → Access control → OAuth) pour que /admin/ fonctionne.

backend:
  name: github
  repo: CharlesCaronFr/portfolio-caroncharles
  branch: main
  base_url: https://api.netlify.com # Netlify sert de passerelle OAuth (gratuit)

site_url: https://caroncharles.fr
locale: fr

media_folder: "images"
public_folder: "/images"

collections:
  - name: contenu
    label: "Contenu du site"
    files:

      # ---------- INFOS GÉNÉRALES ----------
      - name: general
        label: "🏠 Infos générales (hero, contact, footer)"
        file: content/site.json
        fields:
          - { name: nom_ligne1, label: "Nom, ligne 1", widget: string }
          - { name: nom_ligne2, label: "Nom, ligne 2", widget: string }
          - { name: photo, label: "Photo du hero", widget: image, required: false, hint: "Portrait affiché à côté du nom. Laisse vide pour masquer." }
          - name: stats
            label: "Chiffres clés (section En chiffres)"
            label_singular: "chiffre"
            widget: list
            required: false
            summary: "{{fields.valeur}}, {{fields.label}}"
            fields:
              - { name: valeur, label: "Valeur (nombre)", widget: number, value_type: int }
              - { name: suffixe, label: "Suffixe (ex : +, %, k)", widget: string, required: false }
              - { name: label, label: "Légende", widget: string }
          - { name: eyebrow, label: "Étiquette au-dessus du nom", widget: string }
          - { name: intro, label: "Texte d'introduction (HTML autorisé : <strong>)", widget: text }
          - { name: badge_texte, label: "Texte du badge rotatif", widget: string }
          - name: ticker
            label: "Bandeau défilant (une ligne par message)"
            widget: list
            field: { name: item, label: "Message", widget: string }
          - { name: titre_contact, label: "Titre de la section contact", widget: string }
          - { name: email, label: "Adresse email", widget: string }
          - { name: lien_linkedin, label: "Lien LinkedIn", widget: string }
          - { name: lien_cv, label: "Lien du CV (PDF)", widget: string }
          - { name: footer_gauche, label: "Footer, texte de gauche", widget: string }
          - { name: footer_droite, label: "Footer, texte de droite", widget: string }

      # ---------- PROJETS ----------
      - name: projets
        label: "🗂 Projets"
        file: content/projets.json
        fields:
          - name: projets
            label: "Liste des projets"
            label_singular: "projet"
            widget: list
            summary: "{{fields.titre}}"
            fields:
              - { name: image, label: "Image du visuel", widget: image, required: false, hint: "N’importe quel format convient (affiche, capture, logo) : l’image s’affiche en entier dans un cadre, sans recadrage. Laisse vide pour afficher la mire NO SIGNAL." }
              - { name: categorie, label: "Catégorie", widget: string }
              - { name: tag, label: "Étiquette (coin droit)", widget: string }
              - { name: titre, label: "Titre du projet", widget: string }
              - { name: description, label: "Description", widget: text }
              - { name: role, label: "Rôle (fiche TV)", widget: string, required: false, hint: "Ex : Design produit et prototypage" }
              - { name: outils, label: "Outils (fiche TV)", widget: string, required: false, hint: "Ex : Lovable, Supabase, Figma" }
              - { name: resultat, label: "Résultat (fiche TV)", widget: string, required: false, hint: "Un résultat concret, chiffré si possible" }
              - { name: lien, label: "Lien vers la page du projet", widget: string, required: false, hint: "URL complète (https://…). Laisse vide pour masquer le bouton dans la fenêtre." }
              - name: couleur
                label: "Couleur du visuel"
                widget: select
                options:
                  - { label: "Jaune", value: jaune }
                  - { label: "Rouge", value: rouge }
                  - { label: "Blanc", value: blanc }
                default: jaune

      # ---------- COMPÉTENCES ----------
      - name: competences
        label: "🧰 Compétences"
        file: content/competences.json
        fields:
          - name: competences
            label: "Liste des compétences"
            label_singular: "compétence"
            widget: list
            field: { name: item, label: "Compétence", widget: string }

      # ---------- PARCOURS ----------
      - name: parcours
        label: "📍 Parcours"
        file: content/parcours.json
        fields:
          - name: parcours
            label: "Étapes du parcours"
            label_singular: "étape"
            widget: list
            summary: "{{fields.annee}}, {{fields.titre}}"
            fields:
              - { name: annee, label: "Année(s)", widget: string, hint: "Ex : 2025-26" }
              - { name: titre, label: "Titre", widget: string }
              - { name: description, label: "Description", widget: text }
              - name: faits
                label: "Faits concrets (pastilles sous l'étape)"
                label_singular: "fait"
                widget: list
                required: false
                field: { name: item, label: "Fait", widget: string }
              - name: type
                label: "Type d'étape"
                widget: select
                options:
                  - { label: "🎓 École / formation", value: ecole }
                  - { label: "💼 Expérience / travail", value: travail }
                default: ecole
